{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white text-center">
                <h4><i class="fas fa-building"></i> Créer votre structure</h4>
                <p class="mb-0">Entrez les informations de votre hôpital, clinique ou pharmacie</p>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="structure_name" class="form-label">Nom de votre structure *</label>
                            <input type="text" class="form-control" id="structure_name" name="structure_name" 
                                   placeholder="Ex: Hôpital Central, Clinique La Paix, Pharmacie Moderne..." required>
                            <small class="text-muted">C'est le nom qui apparaîtra sur vos factures et reçus</small>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="proprietaire_nom" class="form-label">Votre nom complet *</label>
                            <input type="text" class="form-control" id="proprietaire_nom" name="proprietaire_nom" 
                                   placeholder="Jean Dupont" required>
                            <small class="text-muted">Nom du propriétaire/gérant</small>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email de la structure *</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   placeholder="contact@mastructure.com" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Téléphone *</label>
                            <input type="tel" class="form-control" id="phone" name="phone" 
                                   placeholder="699999999" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="address" class="form-label">Adresse *</label>
                            <input type="text" class="form-control" id="address" name="address" 
                                   placeholder="Ville, quartier, rue..." required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Mot de passe *</label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Minimum 6 caractères" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">Confirmer le mot de passe *</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-paper-plane"></i> Créer ma structure
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Vous avez déjà une structure ? <a href="{{ url_for('index') }}">Connectez-vous</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
